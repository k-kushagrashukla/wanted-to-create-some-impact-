<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Share Your Experience</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-lg">
    <h1 class="text-3xl font-bold mb-4 text-center text-indigo-600">Share Your Experience</h1>

    <form id="experienceForm" class="space-y-4">
      <input type="text" id="name" placeholder="Your Name" required class="w-full p-2 border rounded-lg" />
      <input type="text" id="batch" placeholder="Batch (e.g., 2025)" class="w-full p-2 border rounded-lg" />
      <input type="text" id="company" placeholder="Company Name" required class="w-full p-2 border rounded-lg" />
      <input type="text" id="role" placeholder="Role (e.g., SDE Intern)" class="w-full p-2 border rounded-lg" />
      <input type="url" id="linkedin" placeholder="LinkedIn Profile URL (optional)" class="w-full p-2 border rounded-lg" />

      <textarea id="description" placeholder="Describe your experience..." required
        class="w-full p-2 border rounded-lg h-32 resize-none"></textarea>

      <!-- Category Selection -->
      <div class="flex justify-center space-x-4 mt-4">
        <button id="techBtn" type="button" class="px-6 py-2 rounded-lg bg-gray-200 hover:bg-blue-100 transition">
          Tech
        </button>
        <button id="nonTechBtn" type="button" class="px-6 py-2 rounded-lg bg-gray-200 hover:bg-green-100 transition">
          Non-Tech
        </button>
      </div>

      <label for="rollno">Roll Number:</label>
      <input type="text" id="rollno" placeholder="Your College Roll Number" required class="w-full p-2 border rounded-lg" />


      <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">
        Submit
      </button>
    </form>

    <p id="responseMsg" class="mt-4 text-center text-green-600 hidden"></p>
  </div>

  <script>
    let selectedCategory = "";
    const techBtn = document.getElementById("techBtn");
    const nonTechBtn = document.getElementById("nonTechBtn");

    // Handle category selection
    techBtn.addEventListener("click", () => {
      selectedCategory = "tech";
      techBtn.classList.add("bg-blue-600", "text-white");
      nonTechBtn.classList.remove("bg-green-600", "text-white");
    });

    nonTechBtn.addEventListener("click", () => {
      selectedCategory = "non-tech";
      nonTechBtn.classList.add("bg-green-600", "text-white");
      techBtn.classList.remove("bg-blue-600", "text-white");
    });

    // Handle form submit
    document.getElementById("experienceForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      // Validation for category
      if (!selectedCategory) {
        alert("Please select a category: Tech or Non-Tech");
        return;
      }

      const data = {
        name: document.getElementById("name").value,
        batch: document.getElementById("batch").value,
        company: document.getElementById("company").value,
        role: document.getElementById("role").value,
        description: document.getElementById("description").value,
        category: selectedCategory,
        rollno: document.getElementById("rollno").value,
        linkedin: document.getElementById("linkedin").value,
      };

      try {
        const res = await fetch("/api/add-experience", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        const result = await res.json();
        document.getElementById("responseMsg").classList.remove("hidden");
        document.getElementById("responseMsg").innerText = result.message;

        // Reset form
        document.getElementById("experienceForm").reset();
        selectedCategory = "";
        techBtn.classList.remove("bg-blue-600", "text-white");
        nonTechBtn.classList.remove("bg-green-600", "text-white");
      } catch (err) {
        console.error("Error submitting:", err);
        alert("Something went wrong. Please try again later.");
      }
    });
  </script>
</body>
</html>
