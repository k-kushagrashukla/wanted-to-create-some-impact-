<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiences | Knowledge</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 font-sans min-h-screen flex flex-col">
  <!-- Navbar -->
  <nav class="bg-white shadow-md p-4 flex flex-wrap justify-between items-center">
    <h1 class="text-xl sm:text-2xl font-bold text-blue-600 mb-2 sm:mb-0">🎓 Knowledge</h1>
    <div class="flex flex-wrap gap-3 sm:gap-4">
      <a href="/index.html" class="hover:text-blue-600 text-gray-700 text-sm sm:text-base">Home</a>
      <a href="/submit.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 text-sm sm:text-base">Share Experience</a>
    </div>
  </nav>

  <!-- Header -->
  <section class="text-center mt-10 px-4">
    <h2 class="text-2xl sm:text-3xl font-semibold mb-2 text-gray-800">All Shared Experiences</h2>
    <p class="text-gray-600 text-sm sm:text-base mb-8">Learn directly from seniors who have been through the process.</p>
  </section>

  <!-- Filter Buttons -->
  <div class="flex flex-wrap justify-center gap-3 sm:gap-4 mb-8 px-3">
    <button id="showAll" class="px-4 py-2 rounded-lg border border-gray-400 text-gray-600 hover:bg-gray-100 text-sm sm:text-base">All</button>
    <button id="showTech" class="px-4 py-2 rounded-lg border border-blue-600 text-blue-600 hover:bg-blue-50 text-sm sm:text-base">Tech 💻</button>
    <button id="showNonTech" class="px-4 py-2 rounded-lg border border-green-600 text-green-600 hover:bg-green-50 text-sm sm:text-base">Non-Tech 📊</button>
  </div>

  <!-- Experiences List -->
  <section class="flex-1 w-full max-w-6xl mx-auto p-4">
    <div id="experienceList" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </section>

  <script>
    let allExperiences = [];

    // Fetch experiences
    async function loadExperiences() {
      try {
        const res = await fetch("/api/experiences");
        const data = await res.json();
        allExperiences = data;
        displayExperiences(data);
      } catch (err) {
        console.error("Error loading experiences:", err);
      }
    }

    // Render experiences
    function displayExperiences(experiences) {
      const container = document.getElementById("experienceList");
      if (experiences.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-500 col-span-full">No experiences found.</p>`;
        return;
      }

      container.innerHTML = experiences.map(exp => `
        <div class="bg-white p-5 rounded-xl shadow-md hover:shadow-lg transition flex flex-col justify-between">
          <div>
            <h3 class="text-lg font-bold text-blue-600 break-words">${exp.company}</h3>
            <p class="text-xs sm:text-sm text-gray-500 mt-1">${exp.role || ''}${exp.batch ? ' | Batch ' + exp.batch : ''}</p>

            <p class="mt-3 text-gray-700 text-sm leading-relaxed break-words">
              ${exp.description.length > 250 ? exp.description.substring(0, 250) + '...' : exp.description}
            </p>

            <div class="mt-4 text-sm">
              <p class="text-gray-600">👤 <span class="font-semibold">${exp.name}</span></p>
              <p class="text-gray-500">🎓 Roll No: <span class="font-medium">${exp.rollno || 'N/A'}</span></p>
              ${exp.linkedin ? `<a href="${exp.linkedin}" target="_blank" class="text-blue-500 underline inline-block mt-1 break-all">View LinkedIn</a>` : ''}
            </div>
          </div>

          <div class="mt-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <!-- Category Badge -->
            <span class="inline-block px-3 py-1 text-xs font-medium rounded-full self-start
              ${exp.category === 'tech' ? 'bg-blue-100 text-blue-600' : 'bg-green-100 text-green-600'}">
              ${exp.category === 'tech' ? 'Tech' : 'Non-Tech'}
            </span>

            <!-- Reactions -->
            <div class="flex gap-4 text-lg sm:text-xl items-center">
              <button onclick="addReaction('${exp._id}', 'like', this)" class="hover:scale-110 transition flex items-center gap-1">👍 <span id="like_${exp._id}">${exp.reactions?.like || 0}</span></button>
              <button onclick="addReaction('${exp._id}', 'love', this)" class="hover:scale-110 transition flex items-center gap-1">❤️ <span id="love_${exp._id}">${exp.reactions?.love || 0}</span></button>
              <button onclick="addReaction('${exp._id}', 'laugh', this)" class="hover:scale-110 transition flex items-center gap-1">😂 <span id="laugh_${exp._id}">${exp.reactions?.laugh || 0}</span></button>
              <button onclick="addReaction('${exp._id}', 'wow', this)" class="hover:scale-110 transition flex items-center gap-1">😮 <span id="wow_${exp._id}">${exp.reactions?.wow || 0}</span></button>
            </div>
          </div>
        </div>
      `).join("");
    }

    // Reaction handler
    async function addReaction(id, type, btn) {
      const key = `reaction_${id}_${type}`;
      if (localStorage.getItem(key)) {
        alert(`You already reacted with ${type.toUpperCase()}!`);
        return;
      }

      try {
        const res = await fetch(`/api/experiences/${id}/react`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type })
        });

        if (!res.ok) {
          alert("Failed to react. Try again!");
          return;
        }

        const data = await res.json();
        const countSpan = document.getElementById(`${type}_${id}`);
        if (countSpan) {
          countSpan.textContent = data.reactions[type];
        }

        // visually highlight button
        btn.classList.add("scale-125", "text-blue-600");
        setTimeout(() => btn.classList.remove("scale-125"), 500);

        localStorage.setItem(key, true);
      } catch (err) {
        console.error("Error adding reaction:", err);
      }
    }

    // Filters
    document.getElementById("showAll").addEventListener("click", () => displayExperiences(allExperiences));
    document.getElementById("showTech").addEventListener("click", () => {
      const filtered = allExperiences.filter(exp => exp.category === "tech");
      displayExperiences(filtered);
    });
    document.getElementById("showNonTech").addEventListener("click", () => {
      const filtered = allExperiences.filter(exp => exp.category === "non-tech");
      displayExperiences(filtered);
    });

    loadExperiences();
  </script>
</body>
</html>
