<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Knowledge</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center p-4 sm:p-6">
  <!-- Header -->
  <h1 class="text-2xl sm:text-3xl font-bold text-center text-blue-700 mb-6">
    Knowledge Admin Dashboard
  </h1>

  <!-- Login Section -->
  <div id="loginSection" class="w-full max-w-md bg-white p-6 rounded-xl shadow text-center">
    <h2 class="text-lg font-semibold mb-4 text-gray-700">Admin Login</h2>
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <input
        type="password"
        id="adminPassword"
        placeholder="Enter Admin Password"
        class="p-3 border border-gray-300 rounded-lg w-full sm:w-auto flex-1"
      />
      <button
        id="loginBtn"
        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
      >
        Login
      </button>
    </div>
  </div>

  <!-- Dashboard Section -->
  <div id="dashboard" class="hidden mt-8 w-full max-w-5xl">
    <h2 class="text-xl sm:text-2xl font-semibold mb-4 text-center text-gray-800">All Experiences</h2>

    <div id="experiences" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
  </div>

  <script>
    let adminPassword = "";

    // Handle login
    document.getElementById("loginBtn").addEventListener("click", async () => {
      adminPassword = document.getElementById("adminPassword").value.trim();
      if (!adminPassword) return alert("Enter admin password");

      try {
        const res = await fetch("/api/experiences");
        const data = await res.json();

        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");

        const container = document.getElementById("experiences");
        container.innerHTML = data
          .map(
            (exp) => `
            <div class="p-5 bg-white rounded-xl shadow hover:shadow-lg transition">
              <h3 class="text-lg font-semibold text-blue-700 break-words">
                ${exp.name} ${exp.batch ? `(${exp.batch})` : ""}
              </h3>
              <p class="text-gray-700 text-sm mt-1">${exp.company} — ${exp.role}</p>
              <p class="mt-3 text-gray-600 text-sm leading-relaxed">${exp.description}</p>
              ${
                exp.linkedin
                  ? `<a href="${exp.linkedin}" target="_blank" class="text-blue-600 underline text-sm mt-2 inline-block break-all">LinkedIn</a>`
                  : ""
              }
              <p class="text-xs text-gray-500 mt-1">Roll No: ${exp.rollno || "N/A"}</p>
              <button 
                onclick="deleteExp('${exp._id}')"
                class="mt-4 w-full sm:w-auto px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition"
              >
                Delete
              </button>
            </div>`
          )
          .join("");
      } catch (error) {
        alert("Failed to load experiences. Try again later.");
      }
    });

    // Handle delete
    async function deleteExp(id) {
      if (!confirm("Are you sure you want to delete this experience?")) return;

      try {
        const res = await fetch(`/api/admin-delete/${id}`, {
          method: "DELETE",
          headers: {
            Authorization: adminPassword,
          },
        });

        const result = await res.json();
        if (res.status === 403) {
          alert("Unauthorized: Wrong admin password.");
          return;
        }
        alert(result.message || "Deleted successfully!");
        location.reload();
      } catch (error) {
        alert("Server error while deleting experience.");
      }
    }
  </script>
</body>
</html>
